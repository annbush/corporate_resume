<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Павло Тюпа – Комплаєнс / AML | Резюме</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 32px 20px;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        .resume {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }

        .page {
            padding: 36px 40px 40px 40px;
            background: white;
        }

        /* Типографіка */
        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
        }

        .job-title {
            font-size: 17px;
            font-weight: 500;
            color: #2563eb;
            background: #eff6ff;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            margin: 10px 0 14px 0;
        }

        .contact-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            font-size: 13.5px;
            color: #334155;
            background: #f8fafc;
            padding: 10px 16px;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
        }

        .contact-bar span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .section {
            margin-bottom: 20px;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .section-title {
            font-size: 17px;
            font-weight: 700;
            color: #0f172a;
            border-left: 5px solid #2563eb;
            padding-left: 12px;
            margin-bottom: 12px;
            letter-spacing: -0.2px;
        }

        .profile-text {
            background: #fefce8;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 13.5px;
            line-height: 1.42;
            color: #1e293b;
            border: 1px solid #fde047;
        }

        .experience-item {
            margin-bottom: 16px;
            break-inside: avoid;
        }

        .exp-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 5px;
        }

        .exp-role {
            font-weight: 700;
            font-size: 15px;
            color: #0c4a6e;
        }

        .exp-company {
            font-weight: 600;
            color: #2563eb;
        }

        .exp-date {
            font-size: 12px;
            color: #475569;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .exp-desc {
            padding-left: 10px;
            margin-top: 6px;
        }

        .exp-desc ul {
            list-style: none;
        }

        .exp-desc li {
            font-size: 12.8px;
            line-height: 1.42;
            margin-bottom: 5px;
            color: #1e293b;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .exp-desc li::before {
            content: "•";
            color: #2563eb;
            font-weight: bold;
            font-size: 13px;
        }

        .two-col-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .skills-box {
            flex: 1.5;
        }

        .skills-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-top: 6px;
        }

        .tag {
            background: #eef2ff;
            padding: 4px 11px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #1e40af;
        }

        .lang-item {
            font-size: 13.5px;
            margin-bottom: 5px;
        }

        hr {
            margin: 10px 0 8px;
            border: 0;
            height: 1px;
            background: #e2e8f0;
        }

        /* верхня панель тільки з перемикачем мов (без кнопки PDF) */
        .lang-switch-bar {
            background: #1e293b;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid #cbd5e1;
        }

        .lang-switch {
            display: flex;
            gap: 12px;
            background: #0f172a;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: #cbd5e1;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            padding: 5px 14px;
            border-radius: 30px;
            transition: 0.2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .lang-btn.active {
            background: #2563eb;
            color: white;
        }

        .lang-btn:hover {
            opacity: 0.85;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .resume {
                box-shadow: none;
                border-radius: 0;
                max-width: 100%;
            }
            .lang-switch-bar {
                display: none;
            }
            .page {
                padding: 0.5in 0.45in;
            }
            .contact-bar, .section, .experience-item {
                break-inside: avoid;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
<div class="resume">
    <div class="page" id="resumeContent">
        <!-- контент буде згенеровано JS -->
    </div>
    <div class="lang-switch-bar">
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="uk">🇺🇦 УКР</button>
            <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
        </div>
    </div>
</div>

<script>
    // --------------------------- МУЛЬТИМОВНИЙ КОНТЕНТ (щільно влізає в 1 сторінку) -------------------------
    const translations = {
        uk: {
            name: "Павло Тюпа",
            title: "Спеціаліст з верифікації, комплаєнсу та фінансового моніторингу",
            contacts: ["+38 068 400 84 39", "pavlo.tiupa01@gmail.com", "Кременчук · Готовий до релокації"],
            profileHeading: "Профіль",
            profileText: "Спеціаліст з 3+ роками досвіду у верифікації, AML-моніторингу та комплаєнсі. Опрацював <strong>50 000+ транзакцій</strong> та <strong>3 500+ KYC/AML-кейсів</strong>, залучав B2B-партнерів, координував операційні процеси в умовах високого навантаження.",
            experienceHeading: "Досвід",
            jobs: [
                { role: "Спеціаліст з верифікації та комплаєнсу", company: "IN1 App", date: "2025 — тепер",
                  duties: [
                      "Залучення B2B-партнерів (рієлтори, готелі, девелопери) — 500+ проаналізовано, 150+ контактів, pipeline із 60 лідів.",
                      "Переговори, презентації умов партнерства, ведення CRM, follow-up.",
                      "40–80 верифікаційних кейсів щодня: KYC/KYB, POA, SOF — 3 500+ кейсів загалом.",
                      "AML-моніторинг транзакцій, ескалація ризиків — 1 500+ перевірок.",
                      "Супровід клієнтів від onboarding до EDD, підготовка SOP, дотримання SLA. CSAT 97%, медіана першої відповіді <3 хв."
                  ] },
                { role: "Диспетчер операційних процесів", company: "Workflow", date: "2024 — 2025",
                  duties: [
                      "Координація до 20 технічних спеціалістів щодня, 3 000+ виїздів за рік.",
                      "Планування 10–20 маршрутів щодня з урахуванням пріоритетів та географії.",
                      "Обробка 80–120 звернень щодня, 25 000+ контактів за період роботи.",
                      "Робота у 3 часових зонах одночасно (ET, CT, MT — Канада, США)."
                  ] },
                { role: "Оператор фінансового моніторингу", company: "Any.Money", date: "2023 — 2024",
                  duties: [
                      "Моніторинг 200+ операцій щодня, 50 000+ транзакцій за рік.",
                      "Виявлення підозрілої активності, ескалація AML-ризиків.",
                      "Підготовка звітів, передача висновків відповідальним підрозділам."
                  ] }
            ],
            skillsHeading: "Навички",
            skills: ["KYC/KYB", "AML-моніторинг", "POA/SOF/EDD", "Лід-генерація", "B2B-партнерства", "Документація та SOP", "Регуляторні вимоги ЄС/MiCA", "Багатомовна комунікація", "Робота з великими даними в реальному часі"],
            educationHeading: "Освіта та мови",
            education: "🎓 Бакалавр, прикладна лінгвістика · 2018 — 2022",
            languages: ["🇺🇦 Українська (рідна)", "🇬🇧 Англійська (C2)", "🇩🇪 Німецька (A2)"],
            extraCourse: "🔹 Додаткові курси: AML/CFT, Risk-based approach, Compliance Monitoring",
            stats: ["✅ 50 000+ транзакцій", "✅ 3 500+ KYC/AML кейсів", "✅ 500+ B2B партнерів проаналізовано", "✅ 97% CSAT"]
        },
        en: {
            name: "Pavlo Tiupa",
            title: "Verification, Compliance & Financial Monitoring Specialist",
            contacts: ["+38 068 400 84 39", "pavlo.tiupa01@gmail.com", "Kremenchuk · Open to relocation"],
            profileHeading: "Profile",
            profileText: "Specialist with 3+ years of experience in verification, AML monitoring, and compliance. Processed <strong>50,000+ transactions</strong> and <strong>3,500+ KYC/AML cases</strong>, acquired B2B partners, coordinated operational processes under high workload.",
            experienceHeading: "Experience",
            jobs: [
                { role: "Verification & Compliance Specialist", company: "IN1 App", date: "2025 — present",
                  duties: [
                      "B2B partner acquisition (realtors, hotels, developers) — 500+ analyzed, 150+ contacts, 60 leads pipeline.",
                      "Negotiations, partnership presentations, CRM management, follow-up.",
                      "40–80 verification cases daily: KYC/KYB, POA, SOF — 3,500+ cases total.",
                      "AML transaction monitoring, risk escalation — 1,500+ reviews.",
                      "Client support from onboarding to EDD, SOP preparation, SLA adherence. CSAT 97%, median first response <3 min."
                  ] },
                { role: "Operations Dispatcher", company: "Workflow", date: "2024 — 2025",
                  duties: [
                      "Coordination of up to 20 technical specialists daily, 3,000+ field visits per year.",
                      "Planning 10–20 daily routes considering priorities and geography.",
                      "Processing 80–120 daily requests, 25,000+ contacts during the period.",
                      "Working across 3 time zones simultaneously (ET, CT, MT — Canada, USA)."
                  ] },
                { role: "Financial Monitoring Operator", company: "Any.Money", date: "2023 — 2024",
                  duties: [
                      "Monitoring 200+ operations daily, 50,000+ transactions per year.",
                      "Identifying suspicious activity, escalating AML risks.",
                      "Preparing reports, delivering conclusions to responsible departments."
                  ] }
            ],
            skillsHeading: "Core Skills",
            skills: ["KYC/KYB", "AML Monitoring", "POA/SOF/EDD", "Lead Generation", "B2B Partnerships", "Documentation & SOP", "EU/MiCA regulatory requirements", "Multilingual communication", "Real-time big data processing"],
            educationHeading: "Education & Languages",
            education: "🎓 Bachelor's degree, Applied Linguistics · 2018 — 2022",
            languages: ["🇺🇦 Ukrainian (native)", "🇬🇧 English (C2)", "🇩🇪 German (A2)"],
            extraCourse: "🔹 Additional courses: AML/CFT, Risk-based approach, Compliance Monitoring",
            stats: ["✅ 50,000+ transactions", "✅ 3,500+ KYC/AML cases", "✅ 500+ B2B partners analyzed", "✅ 97% CSAT"]
        }
    };

    function buildResume(lang) {
        const data = translations[lang];
        if (!data) return;

        const container = document.getElementById('resumeContent');
        if (!container) return;

        let html = `
            <h1>${data.name}</h1>
            <div class="job-title">${data.title}</div>
            <div class="contact-bar">
                <span>📞 ${data.contacts[0]}</span>
                <span>✉️ ${data.contacts[1]}</span>
                <span>📍 ${data.contacts[2]}</span>
            </div>
            <div class="section">
                <div class="section-title">${data.profileHeading}</div>
                <div class="profile-text">${data.profileText}</div>
            </div>
            <div class="section">
                <div class="section-title">${data.experienceHeading}</div>
        `;

        data.jobs.forEach(job => {
            html += `
                <div class="experience-item">
                    <div class="exp-header">
                        <div><span class="exp-role">${job.role}</span> · <span class="exp-company">${job.company}</span></div>
                        <div class="exp-date">${job.date}</div>
                    </div>
                    <div class="exp-desc"><ul>
            `;
            job.duties.forEach(duty => {
                html += `<li>${duty}</li>`;
            });
            html += `</ul></div></div>`;
        });

        html += `</div><div class="two-col-grid">
            <div class="skills-box">
                <div class="section-title">${data.skillsHeading}</div>
                <div class="skills-tags">`;

        data.skills.forEach(skill => {
            html += `<span class="tag">${skill}</span>`;
        });

        html += `</div></div><div>
                <div class="section-title">${data.educationHeading}</div>
                <div class="lang-item">${data.education}</div>`;

        data.languages.forEach(langItem => {
            html += `<div class="lang-item">${langItem}</div>`;
        });

        html += `<hr><div class="lang-item" style="font-size:12.5px; color:#2d3a5e;">${data.extraCourse}</div></div></div>
            <div style="margin-top: 10px; border-top: 1px solid #eef2ff; padding-top: 10px; font-size: 11.8px; color: #475569; display: flex; gap: 20px; flex-wrap: wrap;">`;

        data.stats.forEach(stat => {
            html += `<span>${stat}</span>`;
        });

        html += `</div></div>`;
        container.innerHTML = html;
    }

    // --- Перемикання мови ---
    let currentLang = 'uk';
    const langBtns = document.querySelectorAll('.lang-btn');
    
    function setActiveLangButton(lang) {
        langBtns.forEach(btn => {
            if (btn.getAttribute('data-lang') === lang) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    function switchLanguage(lang) {
        currentLang = lang;
        buildResume(lang);
        setActiveLangButton(lang);
        document.documentElement.lang = (lang === 'uk') ? 'uk' : 'en';
        document.title = (lang === 'uk') ? 'Павло Тюпа – Резюме комплаєнс' : 'Pavlo Tiupa – Compliance Resume';
    }

    langBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            const lang = btn.getAttribute('data-lang');
            if (lang) switchLanguage(lang);
        });
    });

    // Ініціалізація (українська)
    buildResume('uk');
    setActiveLangButton('uk');
</script>
</body>
</html>
