<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Павло Тюпа – L1/L2 Support · AML/MLRO · Fintech | Резюме</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 32px 20px;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        .resume {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }

        .page {
            padding: 32px 38px 38px 38px;
            background: white;
        }

        h1 {
            font-size: 30px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .job-title {
            font-size: 16px;
            font-weight: 500;
            color: #2563eb;
            background: #eff6ff;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
            margin: 10px 0 16px 0;
        }

        .contact-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            font-size: 13px;
            color: #334155;
            background: #f8fafc;
            padding: 10px 16px;
            border-radius: 16px;
            margin-bottom: 22px;
            border: 1px solid #e2e8f0;
        }

        .contact-bar span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .resume-grid {
            display: grid;
            grid-template-columns: 1fr 0.9fr;
            gap: 28px;
        }

        .section {
            margin-bottom: 22px;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #0f172a;
            border-left: 5px solid #2563eb;
            padding-left: 12px;
            margin-bottom: 12px;
            letter-spacing: -0.2px;
        }

        .section-subtitle {
            font-size: 14px;
            font-weight: 600;
            color: #1e40af;
            margin: 16px 0 10px 0;
            padding-left: 8px;
            border-left: 3px solid #94a3b8;
        }

        .profile-text {
            background: #fefce8;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.42;
            color: #1e293b;
            border: 1px solid #fde047;
        }

        .experience-item {
            margin-bottom: 18px;
            break-inside: avoid;
        }

        .exp-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }

        .exp-role {
            font-weight: 700;
            font-size: 14px;
            color: #0c4a6e;
        }

        .exp-company {
            font-weight: 600;
            color: #2563eb;
        }

        .exp-date {
            font-size: 11px;
            color: #475569;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .exp-badge {
            font-size: 11px;
            color: #475569;
            margin: 4px 0 8px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .exp-badge span {
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .exp-desc ul {
            list-style: none;
            padding-left: 0;
        }

        .exp-desc li {
            font-size: 12.5px;
            line-height: 1.4;
            margin-bottom: 5px;
            color: #1e293b;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .exp-desc li::before {
            content: "•";
            color: #2563eb;
            font-weight: bold;
            font-size: 13px;
        }

        .skills-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .tag {
            background: #eef2ff;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
            color: #1e40af;
        }

        .lang-item {
            font-size: 13px;
            margin-bottom: 5px;
        }

        hr {
            margin: 12px 0;
            border: 0;
            height: 1px;
            background: #e2e8f0;
        }

        .tools-block {
            background: #f8fafc;
            border-radius: 14px;
            padding: 10px 12px;
            margin: 12px 0;
            border: 1px solid #e2e8f0;
        }

        .tools-title {
            font-weight: 700;
            font-size: 12px;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .tools-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tool-item {
            background: white;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 10.5px;
            font-weight: 500;
            color: #2563eb;
            border: 1px solid #cbd5e1;
        }

        .cert-item {
            font-size: 12px;
            margin-bottom: 5px;
            color: #334155;
        }

        .lang-switch-bar {
            background: #1e293b;
            padding: 8px 20px;
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid #cbd5e1;
        }

        .lang-switch {
            display: flex;
            gap: 10px;
            background: #0f172a;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: #cbd5e1;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
            transition: 0.2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .lang-btn.active {
            background: #2563eb;
            color: white;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .resume {
                box-shadow: none;
                border-radius: 0;
            }
            .lang-switch-bar {
                display: none;
            }
            .page {
                padding: 0.45in 0.4in;
            }
        }

        @media (max-width: 750px) {
            .resume-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>

    function setActiveLangButton(lang) {
        langBtns.forEach(btn => {

        });
    }

    function switchLanguage(lang) {
        currentLang = lang;
        buildResume(lang);
        setActiveLangButton(lang);
        document.documentElement.lang = (lang === 'uk') ? 'uk' : 'en';
        document.title = (lang === 'uk') ? 'Павло Тюпа – L1/L2 Support Fintech' : 'Pavlo Tiupa – L1/L2 Support Fintech';
